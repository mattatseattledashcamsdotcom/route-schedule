<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Click each button to download the icon PNG files, then place them in the project root.</p>
<button onclick="gen(192)">Download icon-192.png</button>
<button onclick="gen(512)">Download icon-512.png</button>
<canvas id="c" style="display:none"></canvas>
<script>
function gen(size) {
  const c = document.getElementById('c');
  c.width = c.height = size;
  const ctx = c.getContext('2d');

  // Background
  ctx.fillStyle = '#161b27';
  const r = size * 0.12;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.arcTo(size, 0, size, r, r);
  ctx.lineTo(size, size - r);
  ctx.arcTo(size, size, size - r, size, r);
  ctx.lineTo(r, size);
  ctx.arcTo(0, size, 0, size - r, r);
  ctx.lineTo(0, r);
  ctx.arcTo(0, 0, r, 0, r);
  ctx.fill();

  const cx = size / 2;
  const cy = size / 2;
  const pad = size * 0.18;

  // Route dots (4 colored dots in a 2x2 grid representing the 4 work days)
  const dotR = size * 0.085;
  const gap = size * 0.17;
  const colors = ['#f97316', '#22d3ee', '#a78bfa', '#4ade80'];
  const positions = [
    [cx - gap, cy - gap],
    [cx + gap, cy - gap],
    [cx - gap, cy + gap],
    [cx + gap, cy + gap]
  ];
  positions.forEach(([x, y], i) => {
    ctx.fillStyle = colors[i];
    ctx.beginPath();
    ctx.arc(x, y, dotR, 0, Math.PI * 2);
    ctx.fill();
  });

  // Connect dots with lines
  ctx.strokeStyle = '#252d42';
  ctx.lineWidth = size * 0.025;
  ctx.beginPath();
  ctx.moveTo(cx - gap, cy - gap);
  ctx.lineTo(cx + gap, cy - gap);
  ctx.lineTo(cx + gap, cy + gap);
  ctx.lineTo(cx - gap, cy + gap);
  ctx.lineTo(cx - gap, cy - gap);
  ctx.stroke();

  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>

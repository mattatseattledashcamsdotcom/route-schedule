<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#161b27">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Route Schedule">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="config.js"></script>
  <script>
    // Fallback credentials for deployed version
    if (typeof window.GAPI_CONFIG === 'undefined') {
      window.GAPI_CONFIG = {
        CLIENT_ID: '63101285536-s3k8r8mur1kkb3h8tjadshiuj6gkg3br.apps.googleusercontent.com',
        API_KEY:   'AIzaSyBHscBwnS4qerbairhzS_Kp904XDNetakc'
      };
    }
  </script>
  <title>Route Schedule</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b27;
      --border:  #252d42;
      --tue:     #f97316;
      --wed:     #22d3ee;
      --thu:     #a78bfa;
      --fri:     #4ade80;
      --text:    #f8fafc;
      --muted:   #94a3b8;
      --dim:     #475569;
      --zip-bg:  rgba(34,197,94,0.13);
      --zip-col: #86efac;
      --zip-bdr: rgba(34,197,94,0.28);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .app-title { font-size: 1rem; font-weight: 700; letter-spacing: 0.02em; }
    .app-subtitle { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

    #cal-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
      min-height: 44px;
    }
    #cal-btn:hover { border-color: var(--zip-bdr); color: var(--zip-col); }
    #cal-btn.connected { color: #4ade80; border-color: rgba(74,222,128,0.4); }
    #cal-btn .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--dim);
    }
    #cal-btn.connected .dot { background: #4ade80; }

    /* ── Main content ────────────────────────────── */
    main {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .panel {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
    }
    .panel.active { opacity: 1; pointer-events: all; }

    /* ── ZIP Lookup panel ─────────────────────────── */
    .zip-form {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    #zip-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1.5rem;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.1em;
      outline: none;
      transition: border-color 0.2s;
      min-height: 56px;
    }
    #zip-input:focus { border-color: var(--zip-bdr); }
    #zip-input::placeholder { color: var(--dim); font-weight: 400; }

    #lookup-btn {
      background: #22c55e;
      color: #0d1117;
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      min-width: 80px;
      min-height: 56px;
      transition: background 0.15s;
    }
    #lookup-btn:active { background: #16a34a; }

    /* ZIP status / area name */
    #zip-area {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 16px;
      min-height: 20px;
    }

    /* Slot result cards */
    .slot-cards { display: flex; flex-direction: column; gap: 10px; }

    .slot-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .slot-card .rank {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--dim);
      min-width: 24px;
      line-height: 1;
      padding-top: 2px;
    }
    .slot-card-body { flex: 1; min-width: 0; }
    .slot-card .day-date {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .slot-card .time {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: 'Courier New', monospace;
    }
    .slot-card .route-note {
      font-size: 0.78rem;
      color: var(--dim);
    }
    .slot-card .warning {
      font-size: 0.75rem;
      color: #fbbf24;
      margin-top: 4px;
      display: flex;
      gap: 4px;
      align-items: flex-start;
    }
    .slot-card .day-tag {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      color: #0d1117;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* Empty / error states */
    .state-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .state-msg .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .state-msg h3 { font-size: 1rem; margin-bottom: 6px; color: var(--text); }
    .state-msg p { font-size: 0.85rem; line-height: 1.5; }

    /* Calendar banner */
    #cal-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 0.8rem;
      color: var(--zip-col);
    }
    #cal-banner button {
      margin-left: auto;
      background: rgba(34,197,94,0.2);
      border: none;
      border-radius: 6px;
      padding: 5px 10px;
      color: var(--zip-col);
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
    }
    #cal-banner.hidden { display: none; }

    /* ── Day Schedule panel ───────────────────────── */
    .day-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }
    .day-tab {
      flex: 1;
      padding: 10px 6px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 44px;
    }
    .day-tab.active {
      color: #0d1117;
      border-color: transparent;
    }

    .day-slots { display: flex; flex-direction: column; gap: 10px; }

    .day-slot-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .day-slot-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .day-slot-time {
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
    }
    .day-slot-route {
      font-size: 0.75rem;
      color: var(--dim);
      flex: 1;
    }
    .day-slot-warning {
      font-size: 0.72rem;
      color: #fbbf24;
      padding: 5px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(251,191,36,0.05);
    }
    .day-slot-zips {
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .zip-pill {
      background: var(--zip-bg);
      color: var(--zip-col);
      border: 1px solid var(--zip-bdr);
      border-radius: 6px;
      padding: 4px 9px;
      font-size: 0.78rem;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      transition: background 0.15s;
      min-height: 30px;
      display: flex;
      align-items: center;
    }
    .zip-pill:hover { background: rgba(34,197,94,0.22); }
    .zip-area-hint { font-size: 0.65rem; color: var(--dim); margin-left: 4px; }

    /* ── Map panel ────────────────────────────────── */
    #map-legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .map-filter {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .map-filter-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 36px;
    }
    .map-filter-btn.active { color: #0d1117; border-color: transparent; }
    #map-container {
      height: 420px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* ── Bottom Nav ───────────────────────────────── */
    nav {
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding-bottom: var(--safe-bottom);
      flex-shrink: 0;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 10px 0;
      border: none;
      background: transparent;
      color: var(--dim);
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 56px;
      transition: color 0.15s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; }
    .nav-btn.active { color: var(--zip-col); }

    /* ── Edit Panel ───────────────────────────────── */
    .edit-slot-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .edit-slot-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .edit-slot-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      min-width: 90px;
    }
    .time-inputs {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .time-inputs input[type="time"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
      color: var(--text);
      font-size: 0.9rem;
      min-height: 36px;
      width: 100px;
    }
    .time-inputs span { color: var(--dim); font-size: 0.8rem; }
    .edit-zip-area {
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .edit-zip-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--zip-bg);
      color: var(--zip-col);
      border: 1px solid var(--zip-bdr);
      border-radius: 6px;
      padding: 4px 6px 4px 9px;
      font-size: 0.78rem;
      font-family: 'Courier New', monospace;
    }
    .edit-zip-chip button {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 2px;
      min-height: 0;
    }
    .add-zip-row {
      display: flex;
      gap: 6px;
      padding: 0 12px 10px;
    }
    .add-zip-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      min-height: 36px;
    }
    .add-zip-row button {
      background: var(--zip-bg);
      color: var(--zip-col);
      border: 1px solid var(--zip-bdr);
      border-radius: 8px;
      padding: 0 14px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 36px;
    }
    .reset-btn {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: transparent;
      border: 1px solid #ef4444;
      border-radius: 10px;
      color: #ef4444;
      font-size: 0.85rem;
      cursor: pointer;
      min-height: 44px;
    }

    /* ── Spinner ──────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--zip-col);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div>
      <div class="app-title">Route Schedule</div>
      <div class="app-subtitle">Renton WA · Dash Cam Install</div>
    </div>
    <button id="cal-btn" onclick="handleCalAuth()">
      <span class="dot"></span>
      <span id="cal-btn-label">Connect Calendar</span>
    </button>
  </header>

  <!-- Panels -->
  <main>

    <!-- Lookup Panel -->
    <section id="panel-lookup" class="panel active">
      <div id="cal-banner">
        <span>Connect Google Calendar to see real-time availability</span>
        <button onclick="handleCalAuth()">Connect</button>
      </div>

      <form class="zip-form" onsubmit="handleLookup(event)">
        <input
          id="zip-input"
          type="text"
          inputmode="numeric"
          pattern="[0-9]{5}"
          maxlength="5"
          placeholder="98056"
          autocomplete="off"
          spellcheck="false"
        >
        <button type="submit" id="lookup-btn">Check</button>
      </form>

      <div id="zip-area"></div>
      <div id="results"></div>
    </section>

    <!-- Schedule Panel -->
    <section id="panel-schedule" class="panel">
      <div class="day-tabs" id="day-tabs"></div>
      <div class="day-slots" id="day-slots"></div>
    </section>

    <!-- Edit Panel -->
    <section id="panel-edit" class="panel">
      <div class="day-tabs" id="edit-day-tabs"></div>
      <div id="edit-slots"></div>
      <button class="reset-btn" style="background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.4);color:#4ade80;margin-bottom:10px;" onclick="exportSchedule()">Export schedule.json</button>
      <button class="reset-btn" onclick="resetEdits()">Reset everything to defaults</button>
    </section>

    <!-- Map Panel -->
    <section id="panel-map" class="panel">
      <div id="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div> Tuesday</div>
        <div class="legend-item"><div class="legend-dot" style="background:#22d3ee"></div> Wednesday</div>
        <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div> Thursday</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div> Friday</div>
      </div>
      <div class="map-filter" id="map-filter">
        <button class="map-filter-btn active" data-day="ALL" onclick="setMapFilter(this)">All</button>
        <button class="map-filter-btn" data-day="TUE" style="--day-color:#f97316" onclick="setMapFilter(this)">Tue</button>
        <button class="map-filter-btn" data-day="WED" style="--day-color:#22d3ee" onclick="setMapFilter(this)">Wed</button>
        <button class="map-filter-btn" data-day="THU" style="--day-color:#a78bfa" onclick="setMapFilter(this)">Thu</button>
        <button class="map-filter-btn" data-day="FRI" style="--day-color:#4ade80" onclick="setMapFilter(this)">Fri</button>
      </div>
      <div id="map-container"></div>
    </section>

  </main>

  <!-- Bottom Nav -->
  <nav>
    <button class="nav-btn active" data-panel="lookup" onclick="switchPanel('lookup', this)">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Lookup
    </button>
    <button class="nav-btn" data-panel="schedule" onclick="switchPanel('schedule', this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Schedule
    </button>
    <button class="nav-btn" data-panel="map" onclick="switchPanel('map', this)">
      <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
      Map
    </button>
    <button class="nav-btn" data-panel="edit" onclick="switchPanel('edit', this)">
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit
    </button>
  </nav>

</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Google Identity Services + GAPI (loaded after DOM) -->
<script>
// ─────────────────────────────────────────────────────────
// App state
// ─────────────────────────────────────────────────────────
let SCHEDULE = null;
let calEvents = [];
let calConnected = false;
let gapiReady = false;
let gisReady = false;
let tokenClient = null;
let leafletMap = null;
let mapMarkers = [];
let activeMapFilter = 'ALL';

const SLOT_ORDER = ['8–10 AM', '10:30–12:30', '1–3 PM', '3:30–5 PM'];
const DEFAULT_SLOT_TIMES = {
  '8–10 AM':     [8,  0, 10, 0],
  '10:30–12:30': [10, 30, 12, 30],
  '1–3 PM':      [13, 0, 15, 0],
  '3:30–5 PM':   [15, 30, 17, 0]
};
let SLOT_TIMES = { ...DEFAULT_SLOT_TIMES };
const DAY_NUM = { TUE: 2, WED: 3, THU: 4, FRI: 5 };
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ─────────────────────────────────────────────────────────
// Edit persistence (localStorage)
// ─────────────────────────────────────────────────────────
function loadEdits() {
  try {
    const saved = localStorage.getItem('rs_edits');
    if (!saved) return;
    const edits = JSON.parse(saved);
    if (edits.slotTimes) Object.assign(SLOT_TIMES, edits.slotTimes);
    if (edits.availability && SCHEDULE) Object.assign(SCHEDULE.availability, edits.availability);
  } catch(e) {}
}

function saveEdits() {
  const edits = {
    slotTimes: { ...SLOT_TIMES },
    availability: SCHEDULE ? { ...SCHEDULE.availability } : {}
  };
  localStorage.setItem('rs_edits', JSON.stringify(edits));
}

function exportSchedule() {
  const data = JSON.stringify({
    availability: SCHEDULE.availability,
    areas:        SCHEDULE.areas,
    dayMeta:      SCHEDULE.dayMeta,
    slotRoutes:   SCHEDULE.slotRoutes,
    zipCentroids: SCHEDULE.zipCentroids
  }, null, 2);
  const a = document.createElement('a');
  a.href = 'data:application/json,' + encodeURIComponent(data);
  a.download = 'schedule.json';
  a.click();
}

function resetEdits() {
  if (!confirm('Reset all edits — slot times and ZIP assignments — back to the original defaults?')) return;
  localStorage.removeItem('rs_edits');
  Object.assign(SLOT_TIMES, DEFAULT_SLOT_TIMES);
  const r = fetch('data/schedule.json').then(r => r.json()).then(data => {
    SCHEDULE.availability = data.availability;
    buildSchedulePanel();
    buildEditPanel('TUE');
  });
  alert('Done — everything is back to defaults.');
}

// ─────────────────────────────────────────────────────────
// Edit Panel
// ─────────────────────────────────────────────────────────
let activeEditDay = 'TUE';

function buildEditDayTabs() {
  const tabs = document.getElementById('edit-day-tabs');
  const days = ['TUE','WED','THU','FRI'];
  tabs.innerHTML = days.map(d => {
    const m = SCHEDULE.dayMeta[d];
    return `<button class="day-tab ${d === activeEditDay ? 'active' : ''}"
      style="${d === activeEditDay ? `background:${m.color}` : ''}"
      onclick="selectEditDay('${d}', this)">${m.short}</button>`;
  }).join('');
}

function selectEditDay(day, btn) {
  activeEditDay = day;
  document.querySelectorAll('#edit-day-tabs .day-tab').forEach(b => {
    b.classList.remove('active'); b.style.background = '';
  });
  btn.classList.add('active');
  btn.style.background = SCHEDULE.dayMeta[day].color;
  buildEditPanel(day);
}

function buildEditPanel(day) {
  buildEditDayTabs();
  const color = SCHEDULE.dayMeta[day].color;
  const container = document.getElementById('edit-slots');

  container.innerHTML = SLOT_ORDER.map(slot => {
    const times = SLOT_TIMES[slot];
    const startStr = `${String(times[0]).padStart(2,'0')}:${String(times[1]).padStart(2,'0')}`;
    const endStr   = `${String(times[2]).padStart(2,'0')}:${String(times[3]).padStart(2,'0')}`;

    const zips = Object.entries(SCHEDULE.availability)
      .filter(([, slots]) => slots.some(s => s.day === day && s.slot === slot))
      .map(([zip]) => zip).sort();

    const chips = zips.map(z =>
      `<div class="edit-zip-chip">${z}
         <button onclick="editRemoveZip('${z}','${day}','${slot}')" title="Remove">×</button>
       </div>`
    ).join('');

    const slotId = slot.replace(/[^a-z0-9]/gi, '_');

    return `
      <div class="edit-slot-block">
        <div class="edit-slot-header">
          <span class="edit-slot-label" style="color:${color}">${slot}</span>
          <div class="time-inputs">
            <input type="time" value="${startStr}" onchange="editSlotTime('${slot}', this.value, null)">
            <span>to</span>
            <input type="time" value="${endStr}" onchange="editSlotTime('${slot}', null, this.value)">
          </div>
        </div>
        <div class="edit-zip-area">${chips}</div>
        <div class="add-zip-row">
          <input type="text" inputmode="numeric" placeholder="98001, 98002…" id="add-zip-${slotId}">
          <button onclick="editAddZip('${day}','${slot}','add-zip-${slotId}')">Add</button>
        </div>
      </div>`;
  }).join('');
}

function editSlotTime(slot, newStart, newEnd) {
  const t = SLOT_TIMES[slot];
  if (newStart) {
    const [h, m] = newStart.split(':').map(Number);
    t[0] = h; t[1] = m;
  }
  if (newEnd) {
    const [h, m] = newEnd.split(':').map(Number);
    t[2] = h; t[3] = m;
  }
  saveEdits();
}

function editRemoveZip(zip, day, slot) {
  const avail = SCHEDULE.availability[zip];
  if (!avail) return;
  SCHEDULE.availability[zip] = avail.filter(s => !(s.day === day && s.slot === slot));
  if (SCHEDULE.availability[zip].length === 0) delete SCHEDULE.availability[zip];
  saveEdits();
  buildEditPanel(day);
  buildSchedulePanel();
}

function editAddZip(day, slot, inputId) {
  const input = document.getElementById(inputId);
  const zips = input.value.split(/[\s,]+/).map(z => z.trim()).filter(z => z.length);
  const invalid = zips.filter(z => !/^\d{5}$/.test(z));
  if (invalid.length) { input.style.borderColor = '#ef4444'; return; }
  input.style.borderColor = '';
  zips.forEach(zip => {
    if (!SCHEDULE.availability[zip]) SCHEDULE.availability[zip] = [];
    const already = SCHEDULE.availability[zip].some(s => s.day === day && s.slot === slot);
    if (!already) SCHEDULE.availability[zip].push({ day, slot });
  });
  input.value = '';
  saveEdits();
  buildEditPanel(day);
  buildSchedulePanel();
}

// ─────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────
async function boot() {
  try {
    const r = await fetch('data/schedule.json');
    SCHEDULE = await r.json();
    loadEdits();
    buildSchedulePanel();
    buildEditPanel('TUE');
    // Show default state in lookup
    showLookupDefault();
  } catch (e) {
    document.getElementById('results').innerHTML =
      '<div class="state-msg"><div class="icon">⚠️</div><h3>Could not load schedule data</h3><p>Make sure you\'re serving from a web server, not opening the file directly.</p></div>';
  }

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // Load GAPI config if available
  loadGoogleAPI();
}

function showLookupDefault() {
  document.getElementById('results').innerHTML =
    '<div class="state-msg"><div class="icon">📍</div><h3>Enter a ZIP code</h3><p>Type any Seattle-area ZIP to see the next 3 open appointment slots.</p></div>';
}

// ─────────────────────────────────────────────────────────
// Panel navigation
// ─────────────────────────────────────────────────────────
function switchPanel(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');

  if (name === 'map' && !leafletMap) initMap();
}

// ─────────────────────────────────────────────────────────
// ZIP Lookup
// ─────────────────────────────────────────────────────────
function handleLookup(e) {
  e.preventDefault();
  const zip = document.getElementById('zip-input').value.trim();
  if (!/^\d{5}$/.test(zip)) {
    document.getElementById('zip-area').textContent = 'Enter a valid 5-digit ZIP';
    return;
  }
  lookupZip(zip);
}

function lookupZip(zip) {
  if (!SCHEDULE) return;

  const areaEl = document.getElementById('zip-area');
  const resultsEl = document.getElementById('results');

  const slots = SCHEDULE.availability[zip];
  if (!slots || slots.length === 0) {
    areaEl.textContent = '';
    resultsEl.innerHTML = `
      <div class="state-msg">
        <div class="icon">🗺</div>
        <h3>ZIP ${zip} not on route</h3>
        <p>This ZIP isn't in the current service area. Check the Schedule panel to see which ZIPs are covered each day.</p>
      </div>`;
    return;
  }

  const area = SCHEDULE.areas[zip] || 'Service area';
  const dayCount = [...new Set(slots.map(s => s.day))].length;
  areaEl.textContent = `${area} · ${zip} · ${dayCount} day${dayCount > 1 ? 's' : ''}/week`;

  resultsEl.innerHTML = '<div class="state-msg"><span class="spinner"></span></div>';

  // Small delay so spinner renders before sync computation
  setTimeout(() => {
    const results = getNextSlots(zip, calEvents);
    renderSlotResults(results, zip);
  }, 30);
}

function getNextSlots(zip, events, count = 3) {
  const slots = SCHEDULE.availability[zip];
  if (!slots) return [];

  const results = [];
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  for (let d = 0; d < 28 && results.length < count; d++) {
    const date = new Date(today);
    date.setDate(today.getDate() + d);
    const jsDay = date.getDay();
    const dayKey = Object.keys(DAY_NUM).find(k => DAY_NUM[k] === jsDay);
    if (!dayKey) continue;

    const daySlots = slots
      .filter(s => s.day === dayKey)
      .sort((a, b) => SLOT_ORDER.indexOf(a.slot) - SLOT_ORDER.indexOf(b.slot));

    for (const s of daySlots) {
      if (results.length >= count) break;
      if (!isSlotUpcoming(date, s.slot, now)) continue;
      if (!isSlotFree(date, s.slot, events)) continue;

      const meta = SCHEDULE.slotRoutes[dayKey][s.slot];
      results.push({
        date,
        day: dayKey,
        slot: s.slot,
        route: meta.route,
        warning: meta.warning
      });
    }
  }
  return results;
}

function isSlotUpcoming(date, slotName, now) {
  const times = SLOT_TIMES[slotName];
  if (!times) return false;
  const start = new Date(date);
  start.setHours(times[0], times[1], 0, 0);
  return start > now;
}

function isSlotFree(date, slotName, events) {
  if (!events || events.length === 0) return true;
  const times = SLOT_TIMES[slotName];
  if (!times) return true;
  const slotStart = new Date(date); slotStart.setHours(times[0], times[1], 0, 0);
  const slotEnd   = new Date(date); slotEnd.setHours(times[2], times[3], 0, 0);
  return !events.some(ev => {
    const evS = new Date(ev.start.dateTime || ev.start.date);
    const evE = new Date(ev.end.dateTime   || ev.end.date);
    return evS < slotEnd && evE > slotStart;
  });
}

function renderSlotResults(results, zip) {
  const resultsEl = document.getElementById('results');
  const calNote = calConnected
    ? ''
    : '<p style="font-size:0.75rem;color:var(--dim);margin-bottom:12px;">⚠ Calendar not connected — showing schedule availability only</p>';

  if (results.length === 0) {
    resultsEl.innerHTML = `${calNote}<div class="state-msg"><div class="icon">😅</div><h3>No open slots in 28 days</h3><p>All slots for ZIP ${zip} appear to be booked. Check back later or check the schedule panel.</p></div>`;
    return;
  }

  const cards = results.map((r, i) => {
    const dayMeta = SCHEDULE.dayMeta[r.day];
    const dateStr = `${DAY_NAMES[r.date.getDay()]}, ${MONTH_NAMES[r.date.getMonth()]} ${r.date.getDate()}`;
    const warn = r.warning
      ? `<div class="warning"><span>⚠</span><span>${r.warning}</span></div>`
      : '';
    return `
      <div class="slot-card">
        <div class="rank">${i + 1}</div>
        <div class="slot-card-body">
          <div class="day-date">
            ${dateStr}
            <span class="day-tag" style="background:${dayMeta.color}">${dayMeta.short}</span>
          </div>
          <div class="time">${r.slot}</div>
          ${warn}
        </div>
      </div>`;
  }).join('');

  resultsEl.innerHTML = calNote + '<div class="slot-cards">' + cards + '</div>';
}

// ─────────────────────────────────────────────────────────
// Day Schedule Panel
// ─────────────────────────────────────────────────────────
let activeDay = 'TUE';

function buildSchedulePanel() {
  const tabs = document.getElementById('day-tabs');
  const days = ['TUE','WED','THU','FRI'];
  tabs.innerHTML = days.map(d => {
    const m = SCHEDULE.dayMeta[d];
    return `<button class="day-tab ${d === activeDay ? 'active' : ''}"
      style="${d === activeDay ? `background:${m.color}` : ''}"
      onclick="selectDay('${d}', this)">${m.short}</button>`;
  }).join('');
  renderDaySlots(activeDay);
}

function selectDay(day, btn) {
  activeDay = day;
  document.querySelectorAll('.day-tab').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
  });
  btn.classList.add('active');
  btn.style.background = SCHEDULE.dayMeta[day].color;
  renderDaySlots(day);
}

function renderDaySlots(day) {
  const container = document.getElementById('day-slots');
  const routes = SCHEDULE.slotRoutes[day];
  const avail = SCHEDULE.availability;
  const color = SCHEDULE.dayMeta[day].color;

  const html = SLOT_ORDER.map(slot => {
    const zips = Object.entries(avail)
      .filter(([, slots]) => slots.some(s => s.day === day && s.slot === slot))
      .map(([zip]) => zip)
      .sort();

    if (zips.length === 0) return '';

    const meta = routes[slot];
    const warn = meta.warning
      ? `<div class="day-slot-warning">⚠ ${meta.warning}</div>`
      : '';
    const pills = zips.map(z =>
      `<span class="zip-pill" onclick="switchToLookup('${z}')">${z}<span class="zip-area-hint">${SCHEDULE.areas[z] || ''}</span></span>`
    ).join('');

    return `
      <div class="day-slot-block">
        <div class="day-slot-header">
          <span class="day-slot-time" style="color:${color}">${slot}</span>
          <span class="day-slot-route">${meta.route}</span>
        </div>
        ${warn}
        <div class="day-slot-zips">${pills}</div>
      </div>`;
  }).join('');

  container.innerHTML = html || '<div class="state-msg"><p>No slots for this day.</p></div>';
}

function switchToLookup(zip) {
  document.getElementById('zip-input').value = zip;
  switchPanel('lookup', document.querySelector('[data-panel="lookup"]'));
  lookupZip(zip);
}

// ─────────────────────────────────────────────────────────
// Map Panel
// ─────────────────────────────────────────────────────────
function initMap() {
  const container = document.getElementById('map-container');
  leafletMap = L.map(container, {
    center: [47.55, -122.24],
    zoom: 10,
    zoomControl: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    subdomains: 'abcd',
    maxZoom: 16
  }).addTo(leafletMap);

  renderMapMarkers('ALL');
}

function renderMapMarkers(filter) {
  if (!leafletMap || !SCHEDULE) return;

  mapMarkers.forEach(m => leafletMap.removeLayer(m));
  mapMarkers = [];

  const centroids = SCHEDULE.zipCentroids;
  const avail = SCHEDULE.availability;
  const colors = { TUE:'#f97316', WED:'#22d3ee', THU:'#a78bfa', FRI:'#4ade80' };

  // Determine primary day for each ZIP (first alphabetical day if multiple)
  const dayPriority = ['TUE','WED','THU','FRI'];

  Object.entries(centroids).forEach(([zip, [lat, lng]]) => {
    const slots = avail[zip];
    if (!slots) return;

    const days = [...new Set(slots.map(s => s.day))];
    if (filter !== 'ALL' && !days.includes(filter)) return;

    // Pick color: if filter active use that day, else primary day
    const dayForColor = filter !== 'ALL' ? filter : dayPriority.find(d => days.includes(d));
    const color = colors[dayForColor] || '#fff';

    const svgIcon = L.divIcon({
      html: `<div style="width:10px;height:10px;border-radius:50%;background:${color};border:1px solid rgba(0,0,0,0.3);box-shadow:0 0 4px ${color}88"></div>`,
      className: '',
      iconSize: [10, 10],
      iconAnchor: [5, 5]
    });

    const area = SCHEDULE.areas[zip] || '';
    const dayTags = days.map(d => `<span style="color:${colors[d]}">${d}</span>`).join(' ');
    const m = L.marker([lat, lng], { icon: svgIcon })
      .bindPopup(`<strong style="font-family:monospace">${zip}</strong> ${area}<br><small>${dayTags}</small>`, { maxWidth: 160 })
      .on('click', () => switchToLookup(zip));

    m.addTo(leafletMap);
    mapMarkers.push(m);
  });
}

function setMapFilter(btn) {
  document.querySelectorAll('.map-filter-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
    b.style.color = '';
    b.style.borderColor = '';
  });
  btn.classList.add('active');
  const day = btn.dataset.day;
  const dayColors = { TUE:'#f97316', WED:'#22d3ee', THU:'#a78bfa', FRI:'#4ade80', ALL:'#86efac' };
  btn.style.background = dayColors[day];
  btn.style.color = '#0d1117';
  activeMapFilter = day;
  if (leafletMap) renderMapMarkers(day);
}

// Init active map filter button style
document.querySelector('.map-filter-btn.active').style.background = '#86efac';
document.querySelector('.map-filter-btn.active').style.color = '#0d1117';

// ─────────────────────────────────────────────────────────
// Google Calendar Integration
// ─────────────────────────────────────────────────────────
const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

function loadGoogleAPI() {
  if (typeof window.GAPI_CONFIG === 'undefined') {
    // config.js not present — show connect banner
    updateCalUI(false);
    return;
  }

  // Load GAPI
  const s1 = document.createElement('script');
  s1.src = 'https://apis.google.com/js/api.js';
  s1.onload = () => gapi.load('client', initGapiClient);
  document.head.appendChild(s1);

  // Load GIS
  const s2 = document.createElement('script');
  s2.src = 'https://accounts.google.com/gsi/client';
  s2.onload = initGIS;
  document.head.appendChild(s2);
}

async function initGapiClient() {
  await gapi.client.init({
    apiKey: window.GAPI_CONFIG.API_KEY,
    discoveryDocs: [DISCOVERY_DOC]
  });
  gapiReady = true;
  // Try restoring a saved token
  const saved = localStorage.getItem('gcal_token');
  if (saved) {
    try {
      gapi.client.setToken(JSON.parse(saved));
      await verifyToken();
    } catch {
      localStorage.removeItem('gcal_token');
    }
  }
}

function initGIS() {
  if (!window.GAPI_CONFIG) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: window.GAPI_CONFIG.CLIENT_ID,
    scope: SCOPES,
    callback: handleTokenResponse
  });
  gisReady = true;
}

async function handleCalAuth() {
  if (calConnected) {
    // Disconnect
    gapi.client.setToken(null);
    localStorage.removeItem('gcal_token');
    calEvents = [];
    calConnected = false;
    updateCalUI(false);
    return;
  }

  if (!window.GAPI_CONFIG) {
    alert('Google Calendar is not configured.\n\nCopy config.example.js to config.js and add your Google API credentials.\nSee the README for setup instructions.');
    return;
  }

  if (!gisReady || !gapiReady) {
    alert('Google API is still loading. Please try again in a moment.');
    return;
  }

  tokenClient.requestAccessToken({ prompt: 'consent' });
}

async function handleTokenResponse(resp) {
  if (resp.error) {
    console.error('Token error:', resp.error);
    return;
  }
  localStorage.setItem('gcal_token', JSON.stringify(gapi.client.getToken()));
  await fetchCalendarEvents();
}

async function verifyToken() {
  // Lightweight check — fetch a tiny window
  await fetchCalendarEvents();
}

async function fetchCalendarEvents() {
  const now = new Date();
  const future = new Date(now);
  future.setDate(now.getDate() + 28);

  try {
    const resp = await gapi.client.calendar.events.list({
      calendarId: 'primary',
      timeMin: now.toISOString(),
      timeMax: future.toISOString(),
      singleEvents: true,
      orderBy: 'startTime',
      maxResults: 200
    });

    calEvents = (resp.result.items || []).filter(ev => {
      const d = new Date(ev.start.dateTime || ev.start.date);
      const day = d.getDay();
      return day >= 2 && day <= 5; // Tue–Fri only
    });

    calConnected = true;
    updateCalUI(true);

    // Re-run lookup if a ZIP is already displayed
    const zip = document.getElementById('zip-input').value.trim();
    if (/^\d{5}$/.test(zip)) lookupZip(zip);

  } catch (e) {
    if (e.status === 401) {
      localStorage.removeItem('gcal_token');
      calConnected = false;
      updateCalUI(false);
    }
    console.error('Calendar fetch error:', e);
  }
}

function updateCalUI(connected) {
  const btn = document.getElementById('cal-btn');
  const label = document.getElementById('cal-btn-label');
  const banner = document.getElementById('cal-banner');

  if (connected) {
    btn.classList.add('connected');
    label.textContent = 'Calendar ✓';
    banner.classList.add('hidden');
  } else {
    btn.classList.remove('connected');
    label.textContent = typeof window.GAPI_CONFIG !== 'undefined' ? 'Connect Calendar' : 'Setup Required';
    banner.classList.remove('hidden');
  }
}

// ─────────────────────────────────────────────────────────
// ZIP input: auto-submit at 5 digits
// ─────────────────────────────────────────────────────────
document.getElementById('zip-input').addEventListener('input', function() {
  if (this.value.length === 5 && /^\d{5}$/.test(this.value)) {
    lookupZip(this.value);
  }
});

// ─────────────────────────────────────────────────────────
// Start
// ─────────────────────────────────────────────────────────
boot();
</script>
